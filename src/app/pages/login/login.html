<div class="login-container">
  <div class="brand">
    <div class="icon">✓</div>
    <h1>Sistema de Gestión Electoral</h1>
    <p>Acceso a la información registrada</p>
  </div>

  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    <p class="subtitle">Ingresa las credenciales asignadas por el administrador</p>

    <div class="alert-error" *ngIf="error">{{ mensajeError }}</div>

    <div class="input-group">
      <label>Correo Electrónico</label>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input type="email" [(ngModel)]="correo" placeholder="correo@ejemplo.com" autocomplete="username" (keyup.enter)="ingresar()" />
      </div>
    </div>

    <div class="input-group">
      <label>Contraseña</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" [(ngModel)]="contrasena" placeholder="••••••••" autocomplete="current-password" (keyup.enter)="ingresar()" />
      </div>
    </div>

    <button class="btn-ingresar" (click)="ingresar()" [disabled]="cargando">
      {{ cargando ? 'Ingresando...' : 'Ingresar al Sistema' }}
    </button>

    <div class="footer-text">Sesión protegida mediante autenticación JWT</div>
  </div>

  <a routerLink="/" class="back-link">← Volver al Dashboard Público</a>
</div>
