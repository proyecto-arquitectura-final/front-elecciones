<div class="admin-wrapper">
  <header class="mobile-topbar">
    <button
      type="button"
      class="menu-toggle"
      aria-label="Abrir menú de administración"
      [attr.aria-expanded]="menuOpen"
      aria-controls="admin-sidebar"
      (click)="toggleMenu()">
      <span aria-hidden="true">☰</span>
    </button>
    <div class="mobile-brand">
      <span class="mobile-brand-icon">✓</span>
      <span>Administración</span>
    </div>
  </header>

  @if (menuOpen) {
    <button type="button" class="sidebar-backdrop" aria-label="Cerrar menú" (click)="closeMenu()"></button>
  }

  <aside id="admin-sidebar" class="sidebar" [class.open]="menuOpen">
    <div class="sidebar-brand">
      <div class="brand-icon">✓</div>
      <div>
        <div class="brand-title">Admin Panel</div>
        <div class="brand-sub">Sistema Electoral</div>
      </div>
      <button type="button" class="sidebar-close" aria-label="Cerrar menú" (click)="closeMenu()">×</button>
    </div>

    <nav class="sidebar-nav" aria-label="Navegación administrativa">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item" (click)="closeMenu()"><span class="nav-icon">⊞</span> Dashboard</a>
      <a routerLink="/admin/partidos" routerLinkActive="active" class="nav-item" (click)="closeMenu()"><span class="nav-icon">⚑</span> Partidos</a>
      <a routerLink="/admin/candidatos" routerLinkActive="active" class="nav-item" (click)="closeMenu()"><span class="nav-icon">👤</span> Candidatos</a>
      <a routerLink="/admin/elecciones" routerLinkActive="active" class="nav-item" (click)="closeMenu()"><span class="nav-icon">🗳</span> Elecciones</a>
      <a routerLink="/admin/encuestas" routerLinkActive="active" class="nav-item" (click)="closeMenu()"><span class="nav-icon">📋</span> Encuestas</a>
      <a routerLink="/admin/resultados" routerLinkActive="active" class="nav-item" (click)="closeMenu()"><span class="nav-icon">📈</span> Resultados</a>
      <a routerLink="/admin/reportes" routerLinkActive="active" class="nav-item" (click)="closeMenu()"><span class="nav-icon">📄</span> Reportes</a>
      <a routerLink="/admin/usuarios" routerLinkActive="active" class="nav-item" (click)="closeMenu()"><span class="nav-icon">👥</span> Usuarios</a>
      <a routerLink="/admin/auditoria" routerLinkActive="active" class="nav-item" (click)="closeMenu()"><span class="nav-icon">📊</span> Auditoría</a>
    </nav>

    <div class="sidebar-footer">
      <button type="button" class="nav-item logout" (click)="logout()"><span class="nav-icon">→</span> Cerrar Sesión</button>
    </div>
  </aside>

  <main class="admin-main" (click)="closeMenu()">
    <router-outlet />
  </main>
</div>
