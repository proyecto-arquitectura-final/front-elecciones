<!doctype html>
<html lang="es" data-theme="light" data-font-scale="1">
  <head>
    <meta charset="utf-8" />
    <title>Elecciones Colombia 2026</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
    <meta name="theme-color" content="#f5f7fb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem('elecciones.theme');
          const theme = storedTheme === 'dark' || storedTheme === 'light'
            ? storedTheme
            : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          const storedScaleValue = localStorage.getItem('elecciones.fontScale');
          const storedScale = storedScaleValue === null ? Number.NaN : Number(storedScaleValue);
          const scales = [0.9, 1, 1.125, 1.25];
          const scaleIndex = Number.isInteger(storedScale) && storedScale >= 0 && storedScale < scales.length
            ? storedScale
            : 1;
          document.documentElement.dataset.theme = theme;
          document.documentElement.dataset.fontScale = String(scaleIndex);
          document.documentElement.style.setProperty('--app-font-scale', String(scales[scaleIndex]));
          document.documentElement.style.colorScheme = theme;
        } catch {
          // Se utilizan los valores visuales por defecto.
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
