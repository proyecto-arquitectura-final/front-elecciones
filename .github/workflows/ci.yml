name: Frontend · CI y solicitud de despliegue

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true
env:
  NODE_VERSION: '24.16.0'
  NPM_VERSION: '11.17.0'

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar frontend
        uses: actions/checkout@v6

      - name: Configurar Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Configurar versión de npm
        shell: bash
        run: |
          set -Eeuo pipefail
          npm install --global "npm@${NPM_VERSION}"
          hash -r

          echo "Node instalado: $(node --version)"
          echo "npm instalado:  $(npm --version)"

          test "$(npm --version)" = "${NPM_VERSION}"

      - name: Instalar dependencias
        shell: bash
        run: |
          set -Eeuo pipefail
          npm ci --no-audit --no-fund

      - name: Ejecutar pruebas
        run: npm test -- --watch=false

      - name: Compilar Angular para producción
        run: npm run build

      - name: Validar construcción de imagen Docker
        run: docker build -t elecciones-frontend:ci .

  dispatch-production:
    name: Notificar a la plataforma
    needs: verify
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Iniciar workflow central
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_DISPATCH_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          test -n "$GH_TOKEN" || { echo "Falta PLATFORM_DISPATCH_TOKEN" >&2; exit 2; }
          gh workflow run component-deploy.yml \
            --repo proyecto-arquitectura-final/elecciones-plataforma \
            --ref main \
            -f component=frontend \
            -f component_sha="$SHA"
